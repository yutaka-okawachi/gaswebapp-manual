<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0;url=mahler-search-app/">
    <title>Redirecting to Mahler Search App...</title>
    <link rel="canonical" href="https://yutaka-okawachi.github.io/gaswebapp-manual/mahler-search-app/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="ドイツ語の音楽用語 | German Music Terms Dictionary">
    <meta property="og:description" content="Wagner, Mahler, Strauss などの作品で使用されているドイツ語音楽用語を検索できるデータベースです。">
    <meta property="og:url" content="https://yutaka-okawachi.github.io/gaswebapp-manual/mahler-search-app/">
    <meta property="og:image" content="https://yutaka-okawachi.github.io/gaswebapp-manual/mahler-search-app/favicon.png">
    <meta name="twitter:card" content="summary">
    <style>
        :root {
            --bg-color: #f0f8ff;
            --mahler-color: #8b0000;
            --text-color: #1a2c42;
            --font-family: 'Lora', serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .loader {
            border: 3px solid rgba(26, 44, 66, 0.1);
            border-top: 3px solid var(--mahler-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
        }

        p {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        a {
            color: var(--mahler-color);
            text-decoration: none;
            border-bottom: 1px solid var(--mahler-color);
            transition: opacity 0.2s;
        }

        a:hover {
            opacity: 0.7;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script>
        // JavaScript Fallback Redirect
        setTimeout(function() {
            window.location.replace("mahler-search-app/");
        }, 100);
    </script>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h1>Redirecting to Mahler Search App...</h1>
        <p>自動的に移動しない場合は、<a href="mahler-search-app/">こちらをクリックしてください</a>。</p>
    </div>
</body>
</html>
